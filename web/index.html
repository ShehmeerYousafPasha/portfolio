<!DOCTYPE html>
<html>
<head>
  <script>
    (function () {
      var redirectPath = sessionStorage.getItem('spa_redirect');
      if (redirectPath && window.location.search === '?p=1') {
        sessionStorage.removeItem('spa_redirect');
        window.history.replaceState(null, '', redirectPath);
      }
    })();
  </script>

  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:

    This is a placeholder for base href that will be replaced by the value of

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Shehmeer Yousaf is a Flutter app developer building production-ready mobile and web experiences.">
  <style>
    html, body { margin: 0; min-height: 100%; background: #F6F8FA; }
    #app-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: #F6F8FA;
      color: #0F1117;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: opacity 320ms ease-out, visibility 320ms ease-out;
    }
    #app-loader.is-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-content { position: relative; width: min(260px, calc(100vw - 48px)); text-align: center; }
    .loader-mark {
      display: grid;
      place-items: center;
      width: 72px;
      height: 72px;
      margin: 0 auto;
      border-radius: 22px;
      background: #075448;
      color: #fff;
      font-size: 23px;
      font-weight: 700;
      letter-spacing: 1px;
      box-shadow: 0 12px 28px rgba(7, 84, 72, 0.24);
      animation: loader-pulse 1.1s ease-in-out infinite alternate;
    }
    .loader-name { margin: 22px 0 8px; font-size: 20px; font-weight: 700; }
    .loader-role, .loader-label { color: #4A5568; font-size: 14px; }
    .loader-track { height: 8px; margin: 30px auto 12px; overflow: hidden; border: 1px solid rgba(7, 84, 72, 0.18); border-radius: 999px; background: rgba(7, 84, 72, 0.14); }
    .loader-progress { width: 62%; height: 100%; border-radius: inherit; background: #075448; animation: loader-progress 1.1s ease-in-out infinite alternate; transform-origin: left; }
    @keyframes loader-pulse { to { transform: scale(1.02); } }
    @keyframes loader-progress { from { transform: scaleX(0.62); } to { transform: scaleX(1); } }
    @media (prefers-color-scheme: dark) {
      html, body, #app-loader { background: #090909; }
      #app-loader { color: #EDEDED; }
      .loader-role, .loader-label { color: #858585; }
    }
  </style>
  <script>
    var loaderProgress = 8;
    var loaderComplete = false;
    var loaderProgressTimer;

    function updateLoaderProgress() {
      var label = document.getElementById('loader-label');
      if (label) label.textContent = 'Loading portfolio... ' + loaderProgress + '%';
    }

    window.hideAppLoader = function () {
      if (loaderComplete) return;
      loaderComplete = true;
      window.clearInterval(loaderProgressTimer);
      loaderProgress = 100;
      updateLoaderProgress();

      var loader = document.getElementById('app-loader');
      window.setTimeout(function () {
        if (loader) loader.classList.add('is-hidden');
      }, 120);
    };

    loaderProgressTimer = window.setInterval(function () {
      if (loaderProgress < 92) {
        loaderProgress += loaderProgress < 60 ? 4 : 1;
        updateLoaderProgress();
      }
    }, 180);

    // Emergency fallback in case Flutter cannot initialize.
    window.setTimeout(window.hideAppLoader, 5000);
  </script>
